<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerivue — Access Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #05050f;
  --s0:     #080814;
  --s1:     rgba(255,255,255,0.03);
  --s2:     rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.07);
  --violet: #8b5cf6;
  --rose:   #f43f5e;
  --cyan:   #22d3ee;
  --white:  #f1f5f9;
  --muted:  #475569;
  --success:#34d399;
  --error:  #f87171;
  --gv: rgba(139,92,246,0.18);
  --gr: rgba(244,63,94,0.14);
  --gc: rgba(34,211,238,0.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Syne',sans-serif;
  background:var(--s0);
  color:var(--white);
  min-height:100vh;
  overflow:hidden;
  cursor:none;
  display:flex;
  align-items:center;
  justify-content:center;
}
#cur{width:10px;height:10px;background:var(--violet);border-radius:50%;position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .2s,height .2s,background .2s;}
#ring{width:36px;height:36px;border:1px solid rgba(139,92,246,.45);border-radius:50%;position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);}
body:has(button:hover) #cur,body:has(a:hover) #cur{width:18px;height:18px;background:var(--cyan);}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;animation:drift linear infinite alternate;}
.o1{width:560px;height:560px;background:radial-gradient(circle,var(--violet) 0%,transparent 70%);top:-180px;left:-120px;animation-duration:20s;}
.o2{width:400px;height:400px;background:radial-gradient(circle,var(--rose) 0%,transparent 70%);bottom:-100px;right:-100px;animation-duration:25s;}
.o3{width:300px;height:300px;background:radial-gradient(circle,var(--cyan) 0%,transparent 70%);top:40%;left:55%;opacity:.15;animation-duration:18s;}
@keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-20px) scale(1.04)}100%{transform:translate(-15px,25px) scale(.97)}}
.gl{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:60px 60px;}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.022) 3px,rgba(0,0,0,.022) 4px);}
#cv{position:fixed;inset:0;z-index:998;pointer-events:none;}

/* ── Login Wrap ── */
.login-wrap{
  position:relative;z-index:10;
  width:100%;max-width:460px;
  padding:0 20px;
  animation:fadeUp .9s cubic-bezier(.22,1,.36,1) both .1s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

.login-card{
  position:relative;
  background:rgba(8,8,20,.88);
  backdrop-filter:blur(40px) saturate(160%);
  border:1px solid rgba(139,92,246,.22);
  border-radius:24px;
  padding:40px 36px 36px;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(139,92,246,.05),0 40px 100px rgba(0,0,0,.7),0 0 80px rgba(139,92,246,.06);
}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet) 30%,var(--rose) 60%,var(--cyan),transparent);opacity:.9;}
.login-card::after{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.15) 0%,transparent 70%);pointer-events:none;}
.bracket{position:absolute;width:16px;height:16px;opacity:.5;}
.bracket.tl{top:12px;left:12px;border-top:1.5px solid var(--violet);border-left:1.5px solid var(--violet);}
.bracket.tr{top:12px;right:12px;border-top:1.5px solid var(--rose);border-right:1.5px solid var(--rose);}
.bracket.bl{bottom:12px;left:12px;border-bottom:1.5px solid var(--cyan);border-left:1.5px solid var(--cyan);}
.bracket.br{bottom:12px;right:12px;border-bottom:1.5px solid var(--violet);border-right:1.5px solid var(--violet);}

/* Header */
.lhead{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;text-align:center;}
.lockup{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.wordmark{font-size:2rem;font-weight:800;letter-spacing:.25em;background:linear-gradient(110deg,#fff 0%,var(--violet) 38%,var(--rose) 65%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.lmeta{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;}
.lstatus{display:inline-flex;align-items:center;gap:7px;padding:4px 14px;border:1px solid rgba(52,211,153,.22);border-radius:100px;background:rgba(52,211,153,.05);font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--success);letter-spacing:1.5px;text-transform:uppercase;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pd 1.8s ease infinite;}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

/* Tabs */
.tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:22px;}
.tab{flex:1;padding:9px;border:none;background:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:9px;transition:all .25s;}
.tab.active{background:rgba(139,92,246,.15);color:var(--violet);border:1px solid rgba(139,92,246,.25);}

/* Google Btn */
.gbtn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:14px;
  padding:14px 20px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;
  color:var(--white);font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.05em;
  cursor:pointer;transition:background .3s,border-color .3s,box-shadow .3s,transform .2s;
  position:relative;overflow:hidden;text-decoration:none;
}
.gbtn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(-2px);}
.gbtn:active{transform:translateY(0);}
.gbtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transition:left .5s ease;}
.gbtn:hover::before{left:100%;}
.glogo{width:22px;height:22px;flex-shrink:0;}

/* OR sep */
.orsep{display:flex;align-items:center;gap:12px;margin:18px 0;}
.orsep-line{flex:1;height:1px;background:var(--border);}
.orsep-txt{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* Msg */
.msg{display:none;padding:10px 14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.67rem;letter-spacing:.5px;margin-bottom:14px;line-height:1.5;}
.msg.err{display:flex;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--error);gap:8px;align-items:center;}
.msg.suc{display:flex;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);color:var(--success);gap:8px;align-items:center;}
.msg svg{width:14px;height:14px;flex-shrink:0;}

/* Fields */
.fl{position:relative;margin-bottom:12px;}
.flab{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.flin{width:100%;padding:11px 14px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:11px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:.78rem;outline:none;letter-spacing:.5px;transition:border-color .3s,box-shadow .3s,background .3s;}
.flin::placeholder{color:#2d3f57;}
.flin:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,246,.12);background:rgba(0,0,0,.55);}
.flin.error{border-color:var(--rose);box-shadow:0 0 0 3px rgba(244,63,94,.1);}
.fl-pw .flin{padding-right:44px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);transition:color .2s;}
.eye-btn:hover{color:var(--violet);}
.eye-btn svg{width:15px;height:15px;}

/* Remember row */
.rfrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.rem{display:flex;align-items:center;gap:8px;cursor:pointer;}
.rem input{width:14px;height:14px;accent-color:var(--violet);cursor:pointer;}
.rem span{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.5px;}
.forgot{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--violet);letter-spacing:.5px;text-decoration:none;background:none;border:none;cursor:pointer;transition:color .2s;}
.forgot:hover{color:var(--cyan);}

/* Submit */
.sbtn{
  width:100%;padding:13px;border:none;border-radius:11px;
  font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#7c3aed,#8b5cf6,#a78bfa);
  color:#fff;box-shadow:0 4px 24px rgba(139,92,246,.3);
  transition:opacity .2s,transform .15s,box-shadow .3s;
}
.sbtn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 8px 32px rgba(139,92,246,.4);}
.sbtn:active{transform:translateY(1px);}
.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.sbtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:none;}
.sbtn:hover::before{left:100%;transition:left .5s ease;}
.sbtn.ld .bt{opacity:0;}
.sbtn.ld::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Footer */
.lfoot{margin-top:20px;text-align:center;}
.lfoot p{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:.5px;line-height:1.8;}
.lfoot a{color:var(--violet);text-decoration:none;transition:color .2s;}
.lfoot a:hover{color:var(--cyan);}
.sec-badge{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.sec-badge svg{width:11px;height:11px;opacity:.5;}

@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(7px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.shake{animation:shake .4s ease;}

@media(max-width:500px){
  .login-card{padding:28px 20px 24px;border-radius:18px;}
  .wordmark{font-size:1.5rem;}
  body{align-items:flex-start;padding-top:24px;overflow-y:auto;cursor:auto;}
  #cur,#ring{display:none;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="ring"></div>
<canvas id="cv"></canvas>

<div class="amb">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>
<div class="gl"></div>
<div class="grain"></div>
<div class="scan"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="lhead">
      <div class="lockup">
        <div class="amark">
          <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="50%" stop-color="#f43f5e"/>
                <stop offset="100%" stop-color="#22d3ee"/>
              </linearGradient>
            </defs>
            <polygon points="24,4 44,40 4,40" stroke="url(#lg)" stroke-width="2.4" fill="none" stroke-linejoin="round"/>
            <line x1="13" y1="30" x2="35" y2="30" stroke="url(#lg)" stroke-width="1.8" opacity=".7"/>
            <circle cx="24" cy="4" r="2.4" fill="url(#lg)"/>
            <circle cx="44" cy="40" r="2.4" fill="url(#lg)"/>
            <circle cx="4" cy="40" r="2.4" fill="url(#lg)"/>
          </svg>
        </div>
        <h1 class="wordmark">AERIVUE</h1>
      </div>
      <p class="lmeta">Access Portal &nbsp;/&nbsp; v2.0</p>
      <div class="lstatus"><span class="sdot"></span>Secure Connection Active</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-sign" onclick="switchTab('sign')">Sign In</button>
      <button class="tab" id="tab-reg" onclick="switchTab('reg')">Register</button>
    </div>

    <!-- Google OAuth -->
    <a class="gbtn" href="/auth/google" id="google-btn">
      <svg class="glogo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <div class="orsep">
      <div class="orsep-line"></div>
      <span class="orsep-txt">or email</span>
      <div class="orsep-line"></div>
    </div>

    <div class="msg" id="msg"></div>

    <!-- Sign In -->
    <div id="form-sign">
      <div class="fl">
        <label class="flab" for="si-email">Email Address</label>
        <input class="flin" id="si-email" type="email" placeholder="agent@aerivue.io" autocomplete="email">
      </div>
      <div class="fl fl-pw">
        <label class="flab" for="si-pass">Password</label>
        <input class="flin" id="si-pass" type="password" placeholder="••••••••••••" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePw('si-pass',this)" tabindex="-1" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="rfrow">
        <label class="rem"><input type="checkbox" id="rem-cb"> <span>Remember me</span></label>
        <button class="forgot" onclick="showForgot()" type="button">Forgot password?</button>
      </div>
      <button class="sbtn" id="si-btn" onclick="doSignIn()" type="button"><span class="bt">Execute Access</span></button>
    </div>

    <!-- Register -->
    <div id="form-reg" style="display:none;">
      <div class="fl">
        <label class="flab" for="rg-name">Full Name</label>
        <input class="flin" id="rg-name" type="text" placeholder="Agent Name" autocomplete="name">
      </div>
      <div class="fl">
        <label class="flab" for="rg-email">Email Address</label>
        <input class="flin" id="rg-email" type="email" placeholder="agent@aerivue.io" autocomplete="email">
      </div>
      <div class="fl fl-pw">
        <label class="flab" for="rg-pass">Password</label>
        <input class="flin" id="rg-pass" type="password" placeholder="Min. 8 characters" autocomplete="new-password">
        <button class="eye-btn" onclick="togglePw('rg-pass',this)" tabindex="-1" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="fl fl-pw" style="margin-bottom:16px;">
        <label class="flab" for="rg-conf">Confirm Password</label>
        <input class="flin" id="rg-conf" type="password" placeholder="••••••••••••" autocomplete="new-password">
        <button class="eye-btn" onclick="togglePw('rg-conf',this)" tabindex="-1" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="sbtn" id="rg-btn" onclick="doRegister()" type="button"><span class="bt">Create Account</span></button>
    </div>

    <div class="lfoot">
      <p>By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>
    <div class="sec-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      256-bit SSL &nbsp;&bull;&nbsp; Zero-Knowledge Auth
    </div>
  </div>
</div>

<script>
function switchTab(t){
  const s=t==='sign';
  document.getElementById('form-sign').style.display=s?'block':'none';
  document.getElementById('form-reg').style.display=s?'none':'block';
  document.getElementById('tab-sign').classList.toggle('active',s);
  document.getElementById('tab-reg').classList.toggle('active',!s);
  clearMsg();
}
function togglePw(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.innerHTML=show
    ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
function showMsg(txt,type='err'){
  const m=document.getElementById('msg');
  const icon=type==='err'
    ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
  m.className=`msg ${type==='err'?'err':'suc'}`;
  m.innerHTML=`${icon}<span>${txt}</span>`;
}
function clearMsg(){document.getElementById('msg').className='msg';}
function shake(id){const el=document.getElementById(id);el.classList.add('shake');el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});}

async function doSignIn(){
  clearMsg();
  const email=document.getElementById('si-email').value.trim();
  const pass=document.getElementById('si-pass').value;
  if(!email||!pass){showMsg('Please fill in all fields.');shake('form-sign');return;}
  if(!/\S+@\S+\.\S+/.test(email)){showMsg('Invalid email address.');shake('si-email');return;}
  const btn=document.getElementById('si-btn');
  btn.classList.add('ld');btn.disabled=true;
  try{
    const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,remember:document.getElementById('rem-cb').checked})});
    const data=await res.json();
    if(res.ok){showMsg('Access granted — redirecting…','suc');burst(btn);setTimeout(()=>location.href='/dashboard',1200);}
    else{showMsg(data.message||'Authentication failed.');shake('form-sign');}
  }catch{showMsg('Server unreachable. Ensure backend is running.');}
  finally{btn.classList.remove('ld');btn.disabled=false;}
}
async function doRegister(){
  clearMsg();
  const name=document.getElementById('rg-name').value.trim();
  const email=document.getElementById('rg-email').value.trim();
  const pass=document.getElementById('rg-pass').value;
  const conf=document.getElementById('rg-conf').value;
  if(!name||!email||!pass||!conf){showMsg('Please fill in all fields.');shake('form-reg');return;}
  if(!/\S+@\S+\.\S+/.test(email)){showMsg('Invalid email address.');return;}
  if(pass.length<8){showMsg('Password must be at least 8 characters.');return;}
  if(pass!==conf){showMsg('Passwords do not match.');shake('rg-conf');return;}
  const btn=document.getElementById('rg-btn');
  btn.classList.add('ld');btn.disabled=true;
  try{
    const res=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pass})});
    const data=await res.json();
    if(res.ok){showMsg('Account created — please sign in.','suc');setTimeout(()=>switchTab('sign'),1500);}
    else{showMsg(data.message||'Registration failed.');shake('form-reg');}
  }catch{showMsg('Server unreachable. Ensure backend is running.');}
  finally{btn.classList.remove('ld');btn.disabled=false;}
}
function showForgot(){
  const email=document.getElementById('si-email').value.trim();
  if(!email){showMsg('Enter your email first.');shake('si-email');return;}
  showMsg(`Password reset link sent to ${email}`,'suc');
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const s=document.getElementById('form-sign');
  if(s.style.display!=='none')doSignIn();else doRegister();
});

/* Particle Burst */
const cv=document.getElementById('cv'),cx2=cv.getContext('2d');
let parts=[],looping=false;
const COLS=['#8b5cf6','#f43f5e','#22d3ee','#a78bfa','#fb7185','#67e8f9','#fff','#fbbf24'];
function resizeCv(){cv.width=innerWidth;cv.height=innerHeight;}
resizeCv();addEventListener('resize',resizeCv);
function burst(el){
  const rc=el.getBoundingClientRect();
  const ox=rc.left+rc.width/2,oy=rc.top+rc.height/2;
  for(let i=0;i<90;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*7,sz=1.2+Math.random()*4,life=.55+Math.random()*.7;
    parts.push({x:ox,y:oy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*2.5,sz,col:COLS[~~(Math.random()*COLS.length)],life,ml:life,g:.06+Math.random()*.08,type:Math.random(),rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.18});
  }
  if(!looping)loop();
}
function loop(){
  looping=true;cx2.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.975;p.life-=.016;p.rot+=p.rv;
    const a=Math.max(0,p.life/p.ml);cx2.globalAlpha=a;cx2.fillStyle=cx2.strokeStyle=p.col;
    if(p.type<.45){cx2.beginPath();cx2.arc(p.x,p.y,p.sz*a,0,Math.PI*2);cx2.fill();}
    else if(p.type<.72){cx2.save();cx2.translate(p.x,p.y);cx2.rotate(p.rot);cx2.lineWidth=p.sz*.45;cx2.beginPath();cx2.moveTo(-p.sz*2.5,0);cx2.lineTo(p.sz*2.5,0);cx2.stroke();cx2.restore();}
    else{cx2.save();cx2.translate(p.x,p.y);cx2.rotate(p.rot);cx2.lineWidth=p.sz*.38;cx2.beginPath();cx2.moveTo(-p.sz*2,0);cx2.lineTo(p.sz*2,0);cx2.moveTo(0,-p.sz*2);cx2.lineTo(0,p.sz*2);cx2.stroke();cx2.restore();}
  });
  cx2.globalAlpha=1;parts=parts.filter(p=>p.life>0);
  if(parts.length){requestAnimationFrame(loop);}else{looping=false;cx2.clearRect(0,0,cv.width,cv.height);}
}

/* Floating bg particles */
const bgCv=document.createElement('canvas');
bgCv.style.cssText='position:fixed;inset:0;z-index:1;pointer-events:none;';
document.body.appendChild(bgCv);
const bgCx=bgCv.getContext('2d');
function resizeBg(){bgCv.width=innerWidth;bgCv.height=innerHeight;}
resizeBg();addEventListener('resize',resizeBg);
const bgPts=Array.from({length:50},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,col:COLS[~~(Math.random()*COLS.length)],a:Math.random()*.35+.05}));
(function bgLoop(){
  bgCx.clearRect(0,0,bgCv.width,bgCv.height);
  bgPts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=bgCv.width;if(p.x>bgCv.width)p.x=0;if(p.y<0)p.y=bgCv.height;if(p.y>bgCv.height)p.y=0;bgCx.globalAlpha=p.a;bgCx.fillStyle=p.col;bgCx.beginPath();bgCx.arc(p.x,p.y,p.r,0,Math.PI*2);bgCx.fill();});
  bgCx.globalAlpha=1;requestAnimationFrame(bgLoop);
})();

/* Custom Cursor */
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function rl(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(rl);})();
</script>
